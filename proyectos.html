<!DOCTYPE html>
<html>
  <head>
    <title>Proyectos</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="max-w-3xl mx-auto px-8 py-12 bg-gray-50 text-gray-800">

  <nav class="mb-10">
    <a href="index.html" class="text-blue-500 hover:text-blue-700 mr-6">Inicio</a>
    <a href="proyectos.html" class="text-blue-500 hover:text-blue-700 mr-6">Proyectos</a>
    <a href="blog.html" class="text-blue-500 hover:text-blue-700">Blog</a>
  </nav>

  <h1 class="text-4xl font-bold text-blue-900 border-b-4 border-blue-400 pb-4 mb-8">
    Proyectos
  </h1>

  <!-- Perfil GitHub -->
  <div id="perfil-github" class="mb-12"></div>

  <!-- Linea para poner estadísticas de Github -->
<!-- Estadísticas de GitHub via streak-stats -->
<div class="my-8">
  <img 
    src="https://streak-stats.demolab.com?user=MuenaWWW&locale=es" 
    alt="Estadísticas GitHub de Sebastián"
    class="rounded-lg shadow-sm"
    onerror="this.style.display='none'"
  />
</div>

  <!-- Repositorios -->
  <h2 class="text-2xl font-bold text-blue-700 mb-6">Repositorios en GitHub</h2>
  <div id="repos" class="space-y-4"></div>

  <script>
    // 1. Consultar perfil
    fetch('https://api.github.com/users/MuenaWWW')
      .then(response => response.json())
      .then(data => {
        document.getElementById('perfil-github').innerHTML = `
          <div class="flex items-center gap-6">
            <img src="${data.avatar_url}" class="w-20 h-20 rounded-full" />
            <div>
              <h2 class="text-2xl font-bold text-gray-800">${data.name}</h2>
              <p class="text-gray-600">${data.bio || ''}</p>
              <p class="text-sm text-gray-400 mt-1">
                ${data.public_repos} repositorios · ${data.followers} seguidores
              </p>
            </div>
          </div>
        `;
      });

    // 2. Consultar repositorios
    fetch('https://api.github.com/users/MuenaWWW/repos?sort=updated')
      .then(response => response.json())
      .then(repos => {
        const contenedor = document.getElementById('repos');
        repos.forEach(repo => {
          contenedor.innerHTML += `
            <div class="bg-white rounded-lg p-4 shadow-sm border border-gray-200">
              <a href="${repo.html_url}" target="_blank"
                 class="text-blue-600 font-semibold hover:underline">${repo.name}</a>
              <p class="text-gray-600 text-sm mt-1">${repo.description || 'Sin descripción'}</p>
              <p class="text-xs text-gray-400 mt-2">⭐ ${repo.stargazers_count} · 
                 Actualizado: ${new Date(repo.updated_at).toLocaleDateString('es-CL')}</p>
            </div>
          `;
        });
      });
  </script>

</body>
</html>
